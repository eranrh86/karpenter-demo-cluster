   RESPONSIVE — Tablet  (≤\
    \ 1100px)
   ══════════════════════════════════════════════ */
@media (max-width:1100px){
\
    \  .watchlist{width:300px}
  .detail-panel{width:240px}
  .ch-ma-legend{gap:10px;flex-wrap:wrap}
\
    }

/* ══════════════════════════════════════════════
   RESPONSIVE — Mobile\
    \  (≤ 767px)
   ══════════════════════════════════════════════ */
@media (max-width:767px){
\
    \  /* Allow page to scroll vertically */
  body{height:auto;min-height:100vh;overflow-y:auto;overflow-x:hidden}
\
    
  /* Nav — compact, search takes full width */
  nav{height:50px;padding:0\
    \ 10px;gap:8px}
  .logo{font-size:15px;flex-shrink:0}
  .logo span{display:none}\
    \          /* hide \"Pro\" suffix */
  .clock{display:none}
  .search-wrap{max-width:none}
\
    \  .search-inp{font-size:13px;padding:8px 10px 8px 32px}
  .search-inp::placeholder{font-size:11px}
\
    \  .search-drop{max-height:65vh;border-radius:0 0 12px 12px}
  .si-exch,.si-sec,.si-add-hint{display:none}\
    \   /* simplify dropdown rows */

  /* Ticker — hide to save vertical space\
    \ */
  .ticker{display:none}

  /* Rec strip — tighter padding */
  .rec-section{padding:10px\
    \ 10px 12px}
  .rec-src{display:none}
  .rec-hdr{gap:6px}
  .rec-card{min-width:152px;max-width:152px;padding:11px\
    \ 11px}
  .rc-price{font-size:14px}
  .rc-add{font-size:10px;padding:4px 0}
\
    
  /* Main: stack vertically, allow scroll */
  .main{flex-direction:column;overflow:visible;height:auto}
\
    
  /* Watchlist — full width */
  .watchlist{width:100%;border-right:none;border-bottom:1px\
    \ solid #30363d;max-height:none}
  .wl-cols,.wl-row{grid-template-columns:68px\
    \ 1fr 80px 60px 26px}
  .wl-row{padding:9px 6px}
  .sym{font-size:12px}
  .price{font-size:12px}
\
    \  .chg{font-size:10px}

  /* Chart area — full width */
  .chart-area{border-right:none;min-height:300px}
\
    \  .ch-price{font-size:22px}
  .ch-ma-legend{flex-wrap:wrap;gap:6px;margin-top:4px}
\
    \  .ch-ma-item{font-size:10px}
  .chart-wrap{padding:8px 10px}

  /* Detail\
    \ panel — full width below chart */
  .detail-panel{width:100%;border-left:none}
\
    \  .fund-grid{grid-template-columns:1fr 1fr 1fr}  /* 3 cols on mobile */
  .analyst-grid{grid-template-columns:repeat(5,1fr)}
\
    
  /* Chart header */
  .chart-header{padding:8px 12px}
}

/* ══════════════════════════════════════════════
\
    \   RESPONSIVE — Small phones  (≤ 390px, iPhone SE)
   ══════════════════════════════════════════════\
    \ */
@media (max-width:390px){
  .logo{display:none}
  .wl-cols,.wl-row{grid-template-columns:58px\
    \ 1fr 70px 52px 22px}
  .rec-card{min-width:140px;max-width:140px}
  .fund-grid{grid-template-columns:1fr\
    \ 1fr}
}
</style>
