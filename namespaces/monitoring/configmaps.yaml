    \ = alert.get(\"status\", \"unknown\")
        alertname = labels.get(\"alertname\"\
    , \"UNKNOWN\")
        severity = labels.get(\"severity\", \"N/A\")
       \
    \ priority = labels.get(\"priority\", \"N/A\")
