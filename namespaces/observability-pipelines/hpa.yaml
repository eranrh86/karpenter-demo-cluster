---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: observability-pipelines-worker
  namespace: observability-pipelines
spec:
  maxReplicas: 3
  metrics:
  - resource:
      name: cpu
      target:
        averageUtilization: 70
        type: Utilization
    type: Resource
  minReplicas: 1
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: observability-pipelines-worker
