  server.py: "#!/usr/bin/env python3
\"\"\"Minimal server: serve static page and\
    \ POST /api/fire pushes metric to Pushgateway.\"\"\"
import os
import urllib.request
\
    import urllib.error
from http.server import HTTPServer, SimpleHTTPRequestHandler
\
    
PUSHGATEWAY = os.environ.get(
    \"PUSHGATEWAY_URL\",
    \"http://prometheus-prometheus-pushgateway.monitoring.svc.cluster.local:9091\"\
    ,
)
METRIC_JOB = \"demo_manual\"
METRIC_INSTANCE = \"click\"
METRIC_NAME =\
    \ \"demo_manual_alert_fired\"

# Prometheus exposition format
METRIC_BODY =\
    \ f\"\"\"# TYPE {METRIC_NAME} gauge
{METRIC_NAME} 1
\"\"\"


def push_metric():
\
    \    url = f\"{PUSHGATEWAY.rstrip('/')}/metrics/job/{METRIC_JOB}/instance/{METRIC_INSTANCE}\"\
    
    req = urllib.request.Request(url, data=METRIC_BODY.encode(), method=\"POST\"\
    )
    req.add_header(\"Content-Type\", \"text/plain; charset=utf-8\")
    try:
\
    \        with urllib.request.urlopen(req, timeout=5) as r:
            return\
    \ r.status
    except urllib.error.HTTPError as e:
        return e.code
 \
    \   except Exception as e:
        raise RuntimeError(str(e)) from e


class\
    \ Handler(SimpleHTTPRequestHandler):
    def __init__(self, *args, **kwargs):
\
    \        self.directory = os.path.dirname(os.path.abspath(__file__))
       \
    \ super().__init__(*args, directory=self.directory, **kwargs)

    def do_POST(self):
\
    \        if self.path == \"/api/fire\":
            self.send_response(200)
\
    \            self.send_header(\"Content-Type\", \"text/plain\")
            self.end_headers()
\
    \            try:
                code = push_metric()
                self.wfile.write(f\"\
    OK (pushgateway returned {code})\n\".encode())
            except Exception\
    \ as e:
                self.send_response(500)
                self.wfile.write(f\"\
    Error: {e}\n\".encode())
            return
        self.send_response(404)
\
    \        self.end_headers()

    def log_message(self, format, *args):
   \
    \     pass


if __name__ == \"__main__\":
    port = int(os.environ.get(\"\
    PORT\", \"8080\"))
    HTTPServer((\"\", port), Handler).serve_forever()
"
