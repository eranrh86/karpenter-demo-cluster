    \ margin-bottom: 8px; letter-spacing: -2px; }
    .subtitle { color: #888; margin-bottom:\
    \ 60px; font-size: 1rem; }
    .cards { display: flex; gap: 32px; flex-wrap:\
    \ wrap; justify-content: center; max-width: 900px; }
    .card {
      background:\
    \ #12122a;
      border-radius: 20px;
      padding: 40px 36px;
      width:\
    \ 380px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow\
    \ 0.2s;
      text-decoration: none;
      color: inherit;
      border: 2px\
    \ solid transparent;
      position: relative;
      overflow: hidden;
   \
    \ }
    .card:hover { transform: translateY(-6px); box-shadow: 0 20px 60px rgba(0,0,0,0.5);\
    \ }
    .card.before { border-color: #ff4d4d; }
    .card.after  { border-color:\
    \ #4dff91; }
    .card-badge {
      position: absolute; top: 18px; right: 20px;
\
    \      padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight:\
    \ 700;
    }
    .before .card-badge { background: rgba(255,77,77,0.2); color:\
    \ #ff4d4d; }
    .after  .card-badge { background: rgba(77,255,145,0.2); color:\
    \ #4dff91; }
    .card-icon { font-size: 2.8rem; margin-bottom: 20px; }
   \
    \ .card h2 { font-size: 1.5rem; margin-bottom: 12px; }
    .card p { color: #aaa;\
    \ font-size: 0.93rem; line-height: 1.6; }
    .stats { margin-top: 20px; display:\
    \ flex; gap: 16px; }
    .stat { background: rgba(255,255,255,0.05); border-radius:\
