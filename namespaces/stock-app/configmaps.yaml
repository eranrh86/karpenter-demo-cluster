def calc_rsi(closes, period=14):
    \"\"\"Relative Strength\
    \ Index.\"\"\"
    try:
        import pandas as pd
        delta = closes.diff()
\
    \        gain  = delta.clip(lower=0).rolling(period).mean()
        loss  = (-delta.clip(upper=0)).rolling(period).mean()
\
    \        rs    = gain.iloc[-1] / loss.iloc[-1]
        return round(float(100\
    \ - 100 / (1 + rs)), 1) if loss.iloc[-1] != 0 else 100.0
    except:
      \
    \  return None

def calc_macd(closes):
    \"\"\"MACD, Signal, Histogram.\"\
    \"\"
    try:
        ema12  = closes.ewm(span=12, adjust=False).mean()
  \
    \      ema26  = closes.ewm(span=26, adjust=False).mean()
        macd   = ema12\
    \ - ema26
        signal = macd.ewm(span=9, adjust=False).mean()
        hist\
    \   = macd - signal
        return {
            \"macd\":   round(float(macd.iloc[-1]),\
    \   3),
            \"signal\": round(float(signal.iloc[-1]), 3),
         \
    \   \"hist\":   round(float(hist.iloc[-1]),   3),
            \"trend\":  \"\
    bullish\" if hist.iloc[-1] > 0 else \"bearish\",
        }
    except:
   \
    \     return None

def load_stock(sym):
    \"\"\"Fetch 1yr history via yfinance,\
    \ compute MAs and fundamentals.\"\"\"
    global loading_set
    with data_lock:
\
    \        if sym in loading_set:
            return
        loading_set.add(sym)
\
    \    try:
        import yfinance as yf
        import pandas as pd
      \
    \  t    = yf.Ticker(sym)
        hist = t.history(period=\"1y\", auto_adjust=True)
\
    \        if hist.empty or len(hist) < 5:
            print(f\"{sym}: no history\"\
    , flush=True)
            return
        closes = hist[\"Close\"]
        cur\
    \    = float(closes.iloc[-1])
        prev   = float(closes.iloc[-2]) if len(closes)\
    \ > 1 else cur
        chg    = cur - prev
        pct    = (chg / prev * 100)\
    \ if prev else 0.0
        def ma(w):
            v = closes.rolling(w).mean().iloc[-1]
\
    \            return round(float(v), 2) if not pd.isna(v) and len(closes) >= w\
    \ else None
        ma50  = ma(50)
        ma100 = ma(100)
        ma150 =\
    \ ma(150)
        ma200 = ma(200)
        rsi  = calc_rsi(closes)
        macd\
    \ = calc_macd(closes)
        N = min(120, len(hist))
        def rolling_series(w):
\
    \            r = closes.rolling(w).mean().iloc[-N:]
            return [None\
    \ if pd.isna(v) else round(float(v), 2) for v in r]
        chart = {
     \
    \       \"dates\":  [d.strftime(\"%Y-%m-%d\") for d in hist.index[-N:]],
   \
    \         \"closes\": [round(float(v), 2) for v in closes.iloc[-N:]],
      \
    \      \"ma50\":   rolling_series(50),
            \"ma100\":  rolling_series(100),
\
    \            \"ma150\":  rolling_series(150),
            \"ma200\":  rolling_series(200),
\
    \        }
        # Fundamentals
        try:
            info = t.info
\
    \        except Exception:
            info = {}
        def fmt_cap(v):
 \
    \           if not v: return None
            if v >= 1e12: return f\"${v/1e12:.2f}T\"\
    
            if v >= 1e9:  return f\"${v/1e9:.2f}B\"
            if v >= 1e6:\
    \  return f\"${v/1e6:.2f}M\"
            return f\"${v:,.0f}\"
        fund\
    \ = {
            \"name\":          info.get(\"longName\", sym),
         \
    \   \"sector\":        info.get(\"sector\", \"—\"),
            \"industry\"\
    :      info.get(\"industry\", \"—\"),
            \"market_cap\":    fmt_cap(info.get(\"\
    marketCap\")),
            \"market_cap_raw\":info.get(\"marketCap\"),
    \
    \        \"trailing_pe\":   round(float(info[\"trailingPE\"]), 2) if info.get(\"\
    trailingPE\") else None,
            \"forward_pe\":    round(float(info[\"forwardPE\"\
    ]), 2) if info.get(\"forwardPE\") else None,
            \"eps\":           info.get(\"\
    trailingEps\"),
            \"div_yield\":     round(float(info[\"dividendYield\"\
