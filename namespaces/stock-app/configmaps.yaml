            \"high_52w\":  \
    \    info.get(\"fiftyTwoWeekHigh\"),
            \"low_52w\":       info.get(\"\
    fiftyTwoWeekLow\"),
            \"avg_vol\":       info.get(\"averageVolume\"\
    ),
            \"beta\":          round(float(info[\"beta\"]), 2) if info.get(\"\
    beta\") else None,
            \"pb\":            round(float(info[\"priceToBook\"\
    ]), 2) if info.get(\"priceToBook\") else None,
            \"profit_margin\"\
    : round(float(info[\"profitMargins\"]) * 100, 1) if info.get(\"profitMargins\"\
    ) else None,
            \"revenue_growth\":round(float(info[\"revenueGrowth\"\
    ]) * 100, 1) if info.get(\"revenueGrowth\") else None,
            \"description\"\
    :   (info.get(\"longBusinessSummary\") or \"\")[:300],
            \"currency\"\
