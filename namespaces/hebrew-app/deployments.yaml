---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: hebrew-app
    tier: backend
  name: backend
  namespace: hebrew-app
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: hebrew-app
      tier: backend
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: hebrew-app
        tier: backend
    spec:
      containers:
      - command:
        - /bin/sh
        - -c
        - 'mkdir -p /app && cp /config/package.json /config/index.js /app/

          cd /app && npm install --production && node index.js

          '
        env:
        - name: REDIS_HOST
          value: redis
        - name: REDIS_PORT
          value: '6379'
        image: node:20-alpine
        imagePullPolicy: IfNotPresent
        name: backend
        ports:
        - containerPort: 3000
          protocol: TCP
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 128Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /config
          name: code
          readOnly: true
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
      - configMap:
          defaultMode: 420
          name: hebrew-backend-code
        name: code

---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: hebrew-app
    tier: frontend
  name: frontend
  namespace: hebrew-app
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: hebrew-app
      tier: frontend
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: hebrew-app
        tier: frontend
    spec:
      containers:
      - command:
        - /bin/sh
        - -c
        - 'mkdir -p /app/public && cp /config/package.json /config/index.js /app/

          cp /config/public_index.html /app/public/index.html

          cd /app && npm install --production && node index.js

          '
        env:
        - name: BACKEND_URL
          value: http://backend:3000
        image: node:20-alpine
        imagePullPolicy: IfNotPresent
        name: frontend
        ports:
        - containerPort: 8080
          protocol: TCP
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 128Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /config
          name: code
          readOnly: true
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
      - configMap:
          defaultMode: 420
          name: hebrew-frontend-code
        name: code

---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: hebrew-app
    tier: db
  name: redis
  namespace: hebrew-app
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: hebrew-app
      tier: db
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: hebrew-app
        tier: db
    spec:
      containers:
      - image: redis:7-alpine
        imagePullPolicy: IfNotPresent
        name: redis
        ports:
        - containerPort: 6379
          protocol: TCP
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
          requests:
            cpu: 50m
            memory: 64Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      - command:
        - /bin/sh
        - -c
        - "echo '{\"tier\":\"db\",\"message\":\"מסד הנתונים Redis מוכן – שכבת DB\"\
          ,\"event\":\"redis_ready\"}'
echo '{\"tier\":\"db\",\"message\":\"חיבור\
          \ Redis פעיל ומחכה לבקשות\",\"event\":\"redis_listening\"}'
while true;\
          \ do
  echo \"{\\"tier\\":\\"db\\",\\"message\\":\\"Redis פעיל\\
          \",\\"event\\":\\"heartbeat\\",\\"timestamp\\":\\"$(date)\\"}\"
\
          \  sleep 15
done
"
        image: busybox:1.36
        imagePullPolicy: IfNotPresent
        name: hebrew-logger
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
