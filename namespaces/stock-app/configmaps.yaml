\
    \    // Status
    document.getElementById('m-host').textContent = d.hostname\
    \ || '—';
    document.getElementById('m-ip').textContent   = d.pod_ip   || '—';
\
    \    document.getElementById('m-node').textContent = (d.node||'').replace('.ec2.internal','');
\
    \    document.getElementById('m-up').textContent   = d.uptime_s + 's';
  } catch(e)\
    \ { /* retry next poll */ }
}

// Select stock → fetch detail + render chart\
    \ + fundamentals + social
async function selectStock(sym) {
  sel = sym;
 \
    \ renderWatchlist();
  document.getElementById('chart-empty').style.display =\
    \ 'none';
  // Hide social feed while loading
  document.getElementById('social-section').style.display\
    \ = 'none';
  // On mobile: scroll chart into view after selection
