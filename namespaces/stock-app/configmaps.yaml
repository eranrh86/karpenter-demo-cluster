import\
    \ ddtrace
ddtrace.patch_all(flask=True, logging=True)
from ddtrace import tracer
\
    # ───────────────────────────────────────────────────────────────

import os,\
    \ time, threading, random, json, ssl, urllib.request as _ureq
import logging
\
    from flask import Flask, jsonify, request
from flask_cors import CORS

app\
    \ = Flask(__name__)
CORS(app)

# ── Request logger with APM trace correlation\
    \ ──────────────────
@app.after_request
def _dd_log_request(response):
   \
    \ ctx = tracer.current_trace_context()
    entry = {
        \"timestamp\":\
    \ time.strftime(\"%Y-%m-%dT%H:%M:%SZ\", time.gmtime()),
        \"level\":  \
    \  \"INFO\",
        \"message\":  f\"{request.method} {request.path} HTTP {response.status_code}\"\
    ,
        \"service\":  os.environ.get(\"DD_SERVICE\", \"stock-backend\"),
\
    \        \"env\":      os.environ.get(\"DD_ENV\", \"demo\"),
        \"version\"\
    :  os.environ.get(\"DD_VERSION\", \"1.0\"),
        \"http.method\":      request.method,
\
    \        \"http.url\":         request.path,
        \"http.status_code\": response.status_code,
\
    \        \"storage\":          \"cloudprem\",
    }
    if ctx:
        # Use\
    \ lower 64 bits — Datadog log-to-trace correlation standard format
        entry[\"\
    dd.trace_id\"] = str(ctx.trace_id & 0xFFFFFFFFFFFFFFFF)
        entry[\"dd.span_id\"\
    ]  = str(ctx.span_id)
    print(json.dumps(entry), flush=True)
    return response
\
