    \ solid #21262d;display:flex;flex-direction:column;flex-shrink:0}
.wl-header{background:#161b22;border-bottom:1px\
    \ solid #21262d;padding:0 8px;flex-shrink:0}
.wl-cols{display:grid;grid-template-columns:62px\
    \ 1fr 80px 66px 26px;font-size:10px;color:#8b949e;text-transform:uppercase;letter-spacing:.5px;padding:6px\
    \ 4px;font-weight:600}
.wl-cols span{text-align:right}.wl-cols span:first-child,.wl-cols\
    \ span:nth-child(2){text-align:left}
.wl-body{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
\
    .wl-row{display:grid;grid-template-columns:62px 1fr 80px 66px 26px;align-items:center;padding:7px\
    \ 4px;border-bottom:1px solid #21262d0a;cursor:pointer;transition:background .1s}
\
    .wl-row:hover{background:#161b2280}
.wl-row.active{background:#1f6feb15;border-left:2px\
    \ solid #58a6ff}
.sym{font-size:13px;font-weight:700}
.sname{font-size:10px;color:#8b949e;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
\
    .price{font-size:13px;font-weight:600;text-align:right;font-variant-numeric:tabular-nums}
\
    .chg{font-size:11px;font-weight:600;text-align:right;padding:2px 5px;border-radius:3px}
\
    .pos{color:#3fb950;background:#3fb95015}.neg{color:#f85149;background:#f8514915}
\
    .ma-cell{text-align:right;font-size:10px}
.ma-val{font-variant-numeric:tabular-nums;color:#8b949e}
\
    .ma-ind{font-size:9px;font-weight:700;padding:1px 3px;border-radius:3px;margin-left:2px}
\
    .ma-up{color:#3fb950;background:#3fb95020}.ma-dn{color:#f85149;background:#f8514920}.ma-eq{color:#8b949e}
\
    .del-btn{cursor:pointer;color:#8b949e;font-size:14px;text-align:center;border-radius:4px;transition:all\
    \ .1s}
.del-btn:hover{color:#f85149;background:#f8514915}
.loading-row{padding:10px\
    \ 12px;color:#8b949e;font-size:12px;font-style:italic}
/* CENTER */
.chart-area{flex:1;display:flex;flex-direction:column;overflow:hidden;border-right:1px\
    \ solid #21262d}
.chart-header{background:#161b22;border-bottom:1px solid #21262d;padding:10px\
    \ 16px;flex-shrink:0}
.ch-name{font-size:11px;color:#8b949e;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
\
    .ch-price{font-size:28px;font-weight:700;color:#e6edf3;font-variant-numeric:tabular-nums}
\
    .ch-chg{font-size:13px;font-weight:600;padding:2px 8px;border-radius:5px;margin-left:8px}
\
    .ch-ma-legend{display:flex;gap:16px;margin-top:6px}
.ch-ma-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#8b949e}
\
    .ch-ma-dot{width:12px;height:3px;border-radius:2px}
.chart-wrap{flex:1;padding:12px\
    \ 16px;position:relative;min-height:0}
.chart-empty{display:flex;align-items:center;justify-content:center;color:#8b949e;font-size:14px;height:100%}
\
    /* RIGHT PANEL */
.detail-panel{width:280px;display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
\
    .dp-section{padding:12px 14px;border-bottom:1px solid #21262d}
.dp-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#8b949e;margin-bottom:10px}
\
    .fund-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.fund-box{background:#161b22;border:1px\
    \ solid #21262d;border-radius:6px;padding:7px 9px}
.fund-label{font-size:9px;color:#8b949e;text-transform:uppercase;letter-spacing:.3px}
\
    .fund-val{font-size:13px;font-weight:600;color:#e6edf3;margin-top:2px;font-variant-numeric:tabular-nums}
\
    .fund-val.green{color:#3fb950}.fund-val.red{color:#f85149}.fund-val.blue{color:#58a6ff}
\
    .sector-badge{display:inline-block;background:#1f6feb20;border:1px solid #1f6feb44;color:#58a6ff;border-radius:12px;padding:3px\
    \ 10px;font-size:11px;font-weight:600;margin-top:4px}
.desc{font-size:11px;color:#8b949e;line-height:1.5;margin-top:6px}
\
    /* TRADE */
/* PNL */
/* MIG STATUS */
.mig-row{display:flex;justify-content:space-between;padding:4px\
    \ 0;font-size:11px;border-bottom:1px solid #21262d0a}
.mig-key{color:#8b949e}.mig-val{color:#58a6ff;font-family:monospace;font-size:10px}
\
    .live-dot{width:7px;height:7px;border-radius:50%;background:#3fb950;box-shadow:0\
    \ 0 6px #3fb950;display:inline-block;margin-right:5px;animation:pulse 2s infinite}
\
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
/* ── Our Recommendation\
    \ section ── */
.rec-section{background:#0d1117;border-bottom:1px solid #21262d;padding:12px\
    \ 16px 14px;flex-shrink:0}
.rec-hdr{display:flex;align-items:center;gap:10px;margin-bottom:10px}
\
    .rec-title{font-size:13px;font-weight:700;color:#e6edf3;display:flex;align-items:center;gap:6px}
\
    .rec-sub{font-size:11px;color:#8b949e;margin-left:4px}
.rec-src{font-size:10px;background:#f0883e22;color:#f0883e;border:1px\
    \ solid #f0883e44;border-radius:10px;padding:2px 8px;font-weight:600}
.rec-refresh{margin-left:auto;font-size:11px;color:#8b949e;cursor:pointer;background:none;border:none;color:#8b949e}
\
    .rec-refresh:hover{color:#e6edf3}
.rec-cards{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;scrollbar-width:thin;scrollbar-color:#30363d\
    \ transparent;-webkit-overflow-scrolling:touch}
.rec-cards::-webkit-scrollbar{height:4px}.rec-cards::-webkit-scrollbar-thumb{background:#30363d;border-radius:2px}
\
    .rec-card{background:#161b22;border:1px solid #21262d;border-radius:12px;padding:13px\
    \ 14px;min-width:168px;max-width:168px;cursor:pointer;transition:border-color\
    \ .15s,transform .12s,box-shadow .15s;flex-shrink:0;position:relative}
.rec-card:hover{border-color:#58a6ff55;transform:translateY(-2px);box-shadow:0\
    \ 6px 20px #58a6ff10}
.rc-top{display:flex;align-items:center;gap:6px;margin-bottom:4px}
\
    .rc-flag{font-size:14px}
.rc-sym{font-size:14px;font-weight:800;color:#e6edf3;letter-spacing:.3px}
\
    .rc-social{font-size:9px;background:#f0883e22;color:#f0883e;border:1px solid #f0883e44;border-radius:3px;padding:1px\
    \ 4px;font-weight:700}
.rc-name{font-size:10px;color:#8b949e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:7px}
\
    .rc-price-row{display:flex;align-items:baseline;gap:5px;margin-bottom:6px}
.rc-price{font-size:15px;font-weight:700;color:#e6edf3}
\
    .rc-pct{font-size:11px;font-weight:600}
.rc-pct.up{color:#3fb950}.rc-pct.dn{color:#f85149}
\
    .rc-badge{text-align:center;border-radius:6px;padding:4px 0;font-size:10px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;margin-bottom:6px}
\
    .rb-sb{background:#3fb95025;color:#3fb950;border:1px solid #3fb95050}
.rb-b {background:#58a6ff20;color:#58a6ff;border:1px\
    \ solid #58a6ff44}
.rb-h {background:#8b949e20;color:#8b949e;border:1px solid\
    \ #8b949e44}
.rb-s {background:#f8514920;color:#f85149;border:1px solid #f8514944}
\
    .rc-upside{font-size:11px;color:#3fb950;font-weight:600;margin-bottom:3px}
.rc-upside.negative{color:#f85149}
\
    .rc-meta{font-size:10px;color:#8b949e}
.rc-add{margin-top:8px;width:100%;background:#1f6feb;color:#fff;border:none;border-radius:6px;padding:5px\
    \ 0;font-size:11px;font-weight:700;cursor:pointer;transition:background .12s}
\
    .rc-add:hover{background:#388bfd}
.rc-add.added{background:#3fb95030;color:#3fb950;border:1px\
    \ solid #3fb95050;cursor:default}
.rec-empty{color:#8b949e;font-size:12px;padding:8px\
    \ 0}

/* ── Social Feed ── */
.social-summary{display:flex;gap:8px;padding:8px\
    \ 0 10px;flex-wrap:wrap}
.ss-pill{font-size:11px;font-weight:700;padding:3px\
    \ 10px;border-radius:10px;display:flex;align-items:center;gap:4px}
.ss-bull{background:#3fb95020;color:#3fb950;border:1px\
    \ solid #3fb95040}
.ss-bear{background:#f8514920;color:#f85149;border:1px solid\
    \ #f8514940}
.ss-neutral{background:#8b949e20;color:#8b949e;border:1px solid\
    \ #8b949e40}
.social-feed{margin:0 -14px}
.social-msg{padding:8px 14px;border-top:1px\
    \ solid #21262d;position:relative;transition:background .1s}
.social-msg:hover{background:#161b2260}
\
    .sm-header{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.sm-user{font-size:11px;font-weight:700;color:#58a6ff}
\
    .sm-time{font-size:10px;color:#8b949e;margin-left:auto}
.sm-sent{font-size:9px;font-weight:700;padding:1px\
    \ 5px;border-radius:4px}
.sm-bull{background:#3fb95020;color:#3fb950;border:1px\
    \ solid #3fb95040}
.sm-bear{background:#f8514920;color:#f85149;border:1px solid\
    \ #f8514940}
.sm-body{font-size:11px;color:#c9d1d9;line-height:1.5;word-break:break-word}
\
    .sm-likes{font-size:10px;color:#8b949e55;margin-top:2px}
.ss-loading{font-size:11px;color:#8b949e;padding:6px\
    \ 0;font-style:italic}
.ss-st-link{font-size:10px;color:#8b949e;margin-top:6px;display:block}
\
    .ss-st-link a{color:#58a6ff;text-decoration:none}.ss-st-link a:hover{text-decoration:underline}
