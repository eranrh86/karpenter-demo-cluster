---
apiVersion: v1
data:
  webhook.py: "from flask import Flask, request, jsonify
import os
import requests
\
    import json

app = Flask(__name__)
DD_API_KEY = os.environ.get(\"DD_API_KEY\"\
    , \"test-key\")

@app.route(\"/webhook\", methods=[\"POST\"])
def webhook():
\
    \    data = request.json
    alerts = data.get(\"alerts\", [])
    print(f\"\
    Received {len(alerts)} alerts\")
    
    for alert in alerts:
        labels\
    \ = alert.get(\"labels\", {})
        annotations = alert.get(\"annotations\"\
    , {})
        status = alert.get(\"status\", \"firing\")
        alertname =\
    \ labels.get(\"alertname\")
        severity = labels.get(\"severity\")
   \
    \     summary = annotations.get(\"summary\")
        
        print(f\"Alert:\
    \ {alertname} - {status} - {severity}\")
        print(f\"  Summary: {summary}\"\
    )
        
        # Send to Datadog Events API
        event = {
       \
    \     \"title\": f\"Prometheus: {alertname}\",
            \"text\": annotations.get(\"\
    description\", summary or \"\"),
            \"alert_type\": \"error\" if severity\
    \ == \"critical\" else \"warning\",
            \"source_type_name\": \"prometheus\"\
    ,
            \"tags\": [f\"{k}:{v}\" for k,v in labels.items() if k and v]
\
    \        }
        
        try:
            resp = requests.post(
      \
    \          \"https://api.datadoghq.com/api/v1/events\",
                json=event,
\
    \                headers={\"DD-API-KEY\": DD_API_KEY, \"Content-Type\": \"application/json\"\
    },
                timeout=5
            )
            print(f\"  Sent to Datadog:\
    \ {resp.status_code}\")
        except Exception as e:
            print(f\"\
    \  Error: {e}\")
    
    return jsonify({\"status\": \"ok\", \"received\":\
    \ len(alerts)}), 200

@app.route(\"/health\", methods=[\"GET\"])
def health():
\
    \    return jsonify({\"status\": \"healthy\"}), 200

if __name__ == \"__main__\"\
    :
    print(f\"Starting webhook (API key: {DD_API_KEY[:10]}...)\")
    app.run(host=\"\
    0.0.0.0\", port=8080)
"
