  // ── 52W Range ──
  const lo\
    \ = f.low_52w, hi = f.high_52w, p = d.price;
  if (lo && hi && p && hi > lo)\
    \ {
    const pct = Math.min(Math.max((p - lo) / (hi - lo) * 100, 2), 98);
\
    \    document.getElementById('rng-lo').textContent = c + fmt(lo);
    document.getElementById('rng-hi').textContent\
    \ = c + fmt(hi);
    document.getElementById('rng-dot').style.left  = pct + '%';
\
    \    const fromHi = ((hi - p) / hi * 100).toFixed(1);
    document.getElementById('rng-pct').textContent\
    \ = fromHi + '% from 52W High';
  }
}

function renderAnalyst(f) {
  if (!f\
    \ || !f.rec) return;
  const c = ccy(sel);
  // Rating badge
  const recMap\
    \ = {
    'strong_buy':'Strong Buy','buy':'Buy','hold':'Hold',
    'underperform':'Underperform','sell':'Sell','strong_sell':'Strong\
    \ Sell'
  };
  const clsMap = {
    'strong_buy':'rec-strong-buy','buy':'rec-buy','hold':'rec-hold',
\
    \    'underperform':'rec-sell','sell':'rec-sell','strong_sell':'rec-strong-sell'
\
    \  };
  const recKey = f.rec.toLowerCase().replace(/ /g,'_');
  const recEl\
    \  = document.getElementById('analyst-rec');
  recEl.innerHTML = `<span class=\"\
    analyst-rec-badge ${clsMap[recKey]||'rec-hold'}\">${recMap[recKey]||f.rec}</span>`;
\
    \  // Target price
  if (f.target_mean) {
    document.getElementById('analyst-target').innerHTML\
    \ =
      `Price Target: <strong style=\"color:#58a6ff\">${c}${fmt(f.target_mean)}</strong>`\
    \ +
      (f.target_low && f.target_high
        ? ` <span style=\"color:#8b949e;font-size:11px\"\
    >( Low: ${c}${fmt(f.target_low)} / High: ${c}${fmt(f.target_high)} )</span>` :\
    \ '');
  }
  // Analyst count bar (estimate from recommendationMean: 1=strong\
    \ buy, 5=strong sell)
  const mean = f.strong_buy;  // actually recommendationMean
\
    \  if (mean != null) {
    const buyPct  = Math.max(0, Math.min(100, ((5 - mean)\
    \ / 4) * 100));
    const sellPct = Math.max(0, Math.min(100, ((mean - 1) / 4)\
    \ * 100));
    const holdPct = 100 - buyPct - sellPct;
    document.getElementById('ab-buy').style.width\
    \  = buyPct + '%';
    document.getElementById('ab-hold').style.width = Math.max(holdPct,\
    \ 0) + '%';
    document.getElementById('ab-sell').style.width = sellPct + '%';
\
    \  }
}

// Remove stock
async function removeStock(sym) {
  if (!confirm(`Remove\
    \ ${sym} from watchlist?`)) return;
  delete stocks[sym];
  if (sel === sym)\
    \ { sel = null; if (chart) { chart.destroy(); chart = null; } }
  renderWatchlist();
\
    \  try {
    await fetch(API + '/stocks/' + sym, { method: 'DELETE' });
  }\
    \ catch(e) { console.error(e); }
}


// ── Our Recommendation section ────────────────────────────────────
\
    const REC_BADGE = {
  strong_buy: ['STRONG BUY', 'rb-sb'],
  buy:        ['BUY',\
    \         'rb-b'],
  hold:       ['HOLD',        'rb-h'],
  underperform:['UNDERPERFORM','rb-s'],
\
    \  sell:       ['SELL',        'rb-s'],
  strong_sell:['STRONG SELL', 'rb-s'],
\
    };

async function fetchRecommendations() {
  try {
    const r = await fetch(API\
    \ + '/recommendations');
    if (!r.ok) return;
    const d = await r.json();
\
    \    renderRecommendations(d.recommendations || [], d.ts);
  } catch(e) { console.error('rec\
    \ fetch:', e); }
}

function renderRecommendations(recs, ts) {
  const section\
    \ = document.getElementById('rec-section');
  const cards   = document.getElementById('rec-cards');
\
    \  const sub     = document.getElementById('rec-sub');
  if (!recs.length) {\
    \ section.style.display = 'none'; return; }
  section.style.display = '';
 \
    \ // Update subtitle with timestamp
  const ago = ts ? Math.round((Date.now()/1000\
    \ - ts) / 60) : 0;
  sub.textContent = ago < 2 ? 'Just updated' : `Updated ${ago}m\
    \ ago`;

  const wl = new Set(Object.keys(stocks));
  cards.innerHTML = recs.map(r\
    \ => {
    const flag   = FLAG[r.currency === 'ILS' ? 'IL' : 'US'] || '🌐\
    ';
    const pos    = r.pct >= 0;
    const c      = CCY_MAP[r.currency] ||\
    \ '$';
    const [btxt, bcls] = REC_BADGE[r.rec] || ['HOLD', 'rb-h'];
    const\
    \ upHtml = r.upside != null
      ? `<div class=\"rc-upside${r.upside < 0 ? '\
    \ negative' : ''}\">
          ${r.upside >= 0 ? '↑' : '↓'} ${Math.abs(r.upside)}%\
    \ to target
         </div>`
      : '';
    const socialHtml = r.social_rank
\
    \      ? `<span class=\"rc-social\">📊 #${r.social_rank}</span>`
   \
    \   : '';
    const inWl   = wl.has(r.symbol);
    const addBtn = inWl
   \
    \   ? `<button class=\"rc-add added\" disabled>✓ In Watchlist</button>`
    \
    \  : `<button class=\"rc-add\" onclick=\"event.stopPropagation();recAdd('${r.symbol}')\"\
    >+ Add to Watchlist</button>`;
    return `<div class=\"rec-card\" onclick=\"\
    recClick('${r.symbol}')\">
      <div class=\"rc-top\">
        <span class=\"\
    rc-flag\">${flag}</span>
        <span class=\"rc-sym\">${dispSym(r.symbol)}</span>
\
    \        ${socialHtml}
      </div>
      <div class=\"rc-name\" title=\"${r.name}\"\
    >${r.name}</div>
      <div class=\"rc-price-row\">
        <span class=\"rc-price\"\
    >${c}${fmt(r.price)}</span>
        <span class=\"rc-pct ${pos?'up':'dn'}\">${pos?'+':''}${fmt(r.pct,2)}%</span>
\
    \      </div>
      <div class=\"rc-badge ${bcls}\">${btxt}</div>
      ${upHtml}
\
    \      <div class=\"rc-meta\">${r.analysts ? r.analysts + ' analysts' : ''} ${r.sector\
    \ ? '· ' + r.sector : ''}</div>
      ${addBtn}
    </div>`;
  }).join('');
\
    }

async function recAdd(sym) {
  await addStockBySymbol(sym);
  // Re-render\
    \ to update button state
  fetchRecommendations();
}

function recClick(sym)\
    \ {
  if (stocks[sym]) { selectStock(sym); return; }
  recAdd(sym);
}

//\
    \ Boot — load full catalog once for instant Popular list
async function bootCatalog()\
    \ {
  try {
    const r = await fetch(API + '/catalog');
    const d = await\
    \ r.json();
    _catalogCache = d.catalog || [];
  } catch(e) {}
}
fetchStocks();
\
    setInterval(fetchStocks, 8000);
bootCatalog();
// Delay recommendations slightly\
    \ so initial stocks load first
setTimeout(() => {
  fetchRecommendations();
\
    \  setInterval(fetchRecommendations, 5 * 60 * 1000);  // refresh every 5 min
\
    }, 4000);
</script>
</body>
