kind: ConfigMap
metadata:
  name: migration-agent-script
  namespace: live-migration

---
apiVersion: v1
data:
  migrate.py: "#!/usr/bin/env python3
\"\"\"
Live Migration Orchestrator
1. Reads\
    \ current counter from source pod
2. Triggers CRIU checkpoint via K8s API proxy\
    \ (proper auth, no DNS)
3. Gets checkpoint tar from source agent
4. Transfers\
    \ checkpoint to target node agent
5. Creates Kubernetes pod starting from the\
    \ frozen counter value
6. Validates counter continuity
\"\"\"
import os, sys,\
    \ json, time, base64
import urllib.request, ssl

NS       = \"live-migration\"\
    
# Use KUBERNETES_SERVICE_HOST env var — works even with hostNetwork (no cluster\
    \ DNS needed)
_K8S_HOST = os.environ.get(\"KUBERNETES_SERVICE_HOST\", \"10.100.0.1\"\
    )
_K8S_PORT = os.environ.get(\"KUBERNETES_SERVICE_PORT\", \"443\")
K8S_API \
    \ = \"https://\" + _K8S_HOST + \":\" + _K8S_PORT
SA_TOKEN = open(\"/var/run/secrets/kubernetes.io/serviceaccount/token\"\
    ).read().strip()
SA_CA    = \"/var/run/secrets/kubernetes.io/serviceaccount/ca.crt\"\
    

def k8s_ssl():
    ctx = ssl.create_default_context(cafile=SA_CA)
    return\
    \ ctx

def k8s(method, path, body=None):
    data = json.dumps(body).encode()\
    \ if body else None
    req = urllib.request.Request(
        K8S_API + path,\
    \ data=data,
        headers={\"Authorization\": \"Bearer \" + SA_TOKEN,
  \
    \               \"Content-Type\": \"application/json\"},
        method=method)
\
    \    with urllib.request.urlopen(req, context=k8s_ssl(), timeout=30) as r:
 \
    \       return json.loads(r.read())

def http(method, url, body=None, timeout=300):
\
    \    data = json.dumps(body).encode() if body else None
    req = urllib.request.Request(url,\
    \ data=data,
        headers={\"Content-Type\": \"application/json\"} if data\
    \ else {},
        method=method)
    with urllib.request.urlopen(req, timeout=timeout)\
    \ as r:
        return json.loads(r.read())

def agent(node_ip, path, method=\"\
    GET\", body=None):
    return http(method, \"http://\" + node_ip + \":9090\"\
    \ + path, body)

def log(msg):
    print(\"[\" + time.strftime(\"%H:%M:%S\"\
    ) + \"] \" + msg, flush=True)

def banner(n, msg):
    print(\"\n\" + \"=\"\
    *60, flush=True)
    print(\"STEP \" + str(n) + \": \" + msg, flush=True)
 \
    \   print(\"=\"*60, flush=True)

def node_ip(node_name):
    n = k8s(\"GET\"\
    , \"/api/v1/nodes/\" + node_name)
    for a in n[\"status\"][\"addresses\"]:
\
    \        if a[\"type\"] == \"InternalIP\":
            return a[\"address\"]
\
    \    return None

def parse_cpu_millicores(cpu_str):
    \"\"\"Parse K8s CPU\
    \ string to millicores.\"\"\"
    if not cpu_str:
        return 0
    if cpu_str.endswith(\"\
    m\"):
        return int(cpu_str[:-1])
    try:
        return int(float(cpu_str)\
    \ * 1000)
    except Exception:
        return 0

def node_free_resources(node):
\
    \    \"\"\"Return (free_pods, free_cpu_millicores) on node.\"\"\"
    try:
\
    \        alloc_pods = int(node[\"status\"][\"allocatable\"].get(\"pods\", \"0\"\
    ))
        alloc_cpu  = parse_cpu_millicores(node[\"status\"][\"allocatable\"\
    ].get(\"cpu\", \"0\"))
        node_name  = node[\"metadata\"][\"name\"]
  \
    \      pods_resp  = k8s(\"GET\", \"/api/v1/pods?fieldSelector=spec.nodeName%3D\"\
    \ + node_name)
        used_pods  = 0
        used_cpu   = 0
        for p\
    \ in pods_resp.get(\"items\", []):
            phase = p.get(\"status\", {}).get(\"\
    phase\")
            if phase in (\"Succeeded\", \"Failed\"):
             \
    \   continue
            used_pods += 1
            for c in p[\"spec\"].get(\"\
    containers\", []):
                req = c.get(\"resources\", {}).get(\"requests\"\
    , {})
                used_cpu += parse_cpu_millicores(req.get(\"cpu\", \"0\"\
    ))
        return alloc_pods - used_pods, alloc_cpu - used_cpu
    except Exception\
    \ as e:
        log(\"  resource check error: \" + str(e))
        return 0,\
    \ 0

def wait_pod_ready(name, timeout=300):
    for _ in range(timeout // 5):
\
    \        try:
            p = k8s(\"GET\", \"/api/v1/namespaces/\" + NS + \"\
    /pods/\" + name)
            conds = {c[\"type\"]: c[\"status\"]
          \
    \           for c in p.get(\"status\", {}).get(\"conditions\", [])}
        \
    \    ip  = p.get(\"status\", {}).get(\"podIP\")
            ph  = p.get(\"status\"\
    , {}).get(\"phase\")
            log(\"  pod=\" + name + \" phase=\" + str(ph)\
    \ + \" Ready=\" +
                str(conds.get(\"Ready\")) + \" IP=\" + str(ip))
\
    \            if conds.get(\"Ready\") == \"True\" and ip:
                return\
