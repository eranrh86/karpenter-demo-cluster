kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/instance: prometheus
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/version: v0.31.0
    helm.sh/chart: alertmanager-1.33.0
  name: prometheus-alertmanager
  namespace: monitoring

---
apiVersion: v1
data:
  alerting_rules.yml: "groups:

# Service Availability Alerts
- name: service_availability
\
    \  interval: 30s
  rules:
  - alert: ServiceDown
    expr: up{job=~\"kubernetes-.*\"\
    } == 0
    for: 1m
    labels:
      severity: critical
      category: availability
\
    \      team: platform
    annotations:
      summary: \"Service {{ $labels.job\
    \ }} is down\"
      description: \"{{ $labels.job }} on {{ $labels.instance\
    \ }} has been down for more than 1 minute\"
  
  - alert: HighPodRestartRate
\
    \    expr: rate(kube_pod_container_status_restarts_total[15m]) > 0.1
    for:\
    \ 5m
    labels:
      severity: warning
      category: availability
   \
    \   team: platform
    annotations:
      summary: \"High pod restart rate detected\"\
    
      description: \"Pod {{ $labels.pod }} in namespace {{ $labels.namespace\
    \ }} is restarting frequently\"

# Resource Usage Alerts
- name: resource_usage
\
    \  interval: 30s
  rules:
  - alert: HighCPUUsage
    expr: (sum(rate(container_cpu_usage_seconds_total{container!=\"\
    \"}[5m])) by (pod, namespace) / sum(container_spec_cpu_quota{container!=\"\"}/container_spec_cpu_period{container!=\"\
    \"}) by (pod, namespace)) > 0.8
    for: 5m
    labels:
      severity: warning
\
    \      category: resources
      team: platform
    annotations:
      summary:\
    \ \"High CPU usage detected\"
      description: \"Pod {{ $labels.pod }} in {{\
    \ $labels.namespace }} is using >80% CPU\"
  
  - alert: HighMemoryUsage
 \
    \   expr: (sum(container_memory_working_set_bytes{container!=\"\"}) by (pod, namespace)\
    \ / sum(container_spec_memory_limit_bytes{container!=\"\"}) by (pod, namespace))\
    \ > 0.8
    for: 5m
    labels:
      severity: warning
      category: resources
\
    \      team: platform
    annotations:
      summary: \"High memory usage detected\"\
    
      description: \"Pod {{ $labels.pod }} in {{ $labels.namespace }} is using\
    \ >80% memory\"
  
  - alert: PodCPUThrottling
    expr: rate(container_cpu_cfs_throttled_seconds_total{container!=\"\
    \"}[5m]) > 0.5
    for: 5m
    labels:
      severity: info
      category:\
    \ performance
      team: platform
    annotations:
      summary: \"Pod CPU\
    \ throttling detected\"
      description: \"Pod {{ $labels.pod }} is being CPU\
    \ throttled\"

# Application Performance Alerts
- name: application_performance
\
    \  interval: 30s
  rules:
  - alert: HighLatency
    expr: histogram_quantile(0.95,\
    \ sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service)) > 2
\
    \    for: 5m
    labels:
      severity: warning
      category: performance
\
    \      team: backend
    annotations:
      summary: \"High latency detected\
    \ on {{ $labels.service }}\"
      description: \"95th percentile latency is\
    \ above 2 seconds\"
  
  - alert: HighErrorRate
    expr: (sum(rate(http_requests_total{status=~\"\
    5..\"}[5m])) by (service) / sum(rate(http_requests_total[5m])) by (service)) >\
    \ 0.05
    for: 5m
    labels:
      severity: critical
      category: errors
\
    \      team: backend
    annotations:
      summary: \"High error rate on {{\
    \ $labels.service }}\"
      description: \"Error rate is above 5% for service\
    \ {{ $labels.service }}\"

# Node Health Alerts
- name: node_health
  interval:\
    \ 30s
  rules:
  - alert: NodeNotReady
    expr: kube_node_status_condition{condition=\"\
    Ready\",status=\"true\"} == 0
    for: 5m
    labels:
      severity: critical
\
    \      category: infrastructure
      team: platform
    annotations:
    \
    \  summary: \"Node {{ $labels.node }} is not ready\"
      description: \"Node\
    \ has been in NotReady state for more than 5 minutes\"
  
  - alert: NodeHighDiskPressure
\
    \    expr: kube_node_status_condition{condition=\"DiskPressure\",status=\"true\"\
    } == 1
    for: 5m
    labels:
      severity: warning
      category: infrastructure
\
    \      team: platform
    annotations:
      summary: \"Node {{ $labels.node\
    \ }} has disk pressure\"
      description: \"Node is experiencing disk pressure\"\
    
  
  - alert: NodeMemoryPressure
    expr: kube_node_status_condition{condition=\"\
    MemoryPressure\",status=\"true\"} == 1
    for: 5m
    labels:
      severity:\
    \ warning
      category: infrastructure
      team: platform
    annotations:
\
    \      summary: \"Node {{ $labels.node }} has memory pressure\"
      description:\
    \ \"Node is experiencing memory pressure\"

# Demo-specific alerts (always firing\
    \ for demonstration)
- name: demo_alerts
  interval: 10s
  rules:
  - alert:\
    \ DemoFrontendHealthCheck
    expr: up{job=\"kubernetes-pods\", pod=~\"demo-frontend.*\"\
    } or vector(1)
    for: 10s
    labels:
      severity: info
      category:\
    \ demo
      service: frontend
      team: demo
    annotations:
      summary:\
    \ \"Frontend service health check\"
      description: \"Monitoring frontend\
    \ service availability\"
  - alert: DemoAPILatency
    expr: vector(1) > 0
\
    \    for: 10s
    labels:
      severity: warning
      category: performance
\
    \      service: api
      team: demo
    annotations:
      summary: \"API\
    \ response time elevated\"
      description: \"API service showing increased\
    \ latency (Demo Alert)\"
  - alert: DemoDatabaseConnections
    expr: vector(1)\
    \ > 0
    for: 10s
    labels:
      severity: info
      category: database
\
    \      service: database
      team: demo
    annotations:
      summary: \"\
    Database connection pool usage\"
      description: \"Monitoring database connection\
    \ pool (Demo Alert)\"
  - alert: DemoHighTraffic
    expr: vector(1) > 0
 \
    \   for: 10s
    labels:
      severity: info
      category: traffic
   \
    \   service: frontend
      team: demo
    annotations:
      summary: \"High\
    \ traffic detected\"
      description: \"Frontend receiving elevated traffic\
    \ levels (Demo Alert)\"

# Manual fire from Demo Fire UI (click button → metric\
    \ pushed → this alert fires)
- name: manual_fire
  interval: 15s
  rules:
\
    \  - alert: DemoManualFire
    expr: demo_manual_alert_fired > 0
    for: 15s
\
    \    labels:
      severity: critical
      category: demo
      team: demo
\
    \    annotations:
      summary: \"Manual demo alert fired from UI\"
      description:\
    \ \"This alert was triggered by clicking Fire in the Demo Fire UI\"

- name:\
    \ javaapp001_replicas
  interval: 30s
  rules:
  - alert: Javaapp001ReplicaCountMismatch
\
    \    expr: kube_deployment_spec_replicas{deployment=\"javaapp001\"} != 3
   \
    \ for: 1m
    labels:
      severity: critical
      category: deployment
\
    \      team: platform
    annotations:
      summary: \"Javaapp001 replica count\
    \ is not 3 (expected 3)\"
      description: \"Deployment javaapp001 has {{ $value\
    \ }} replicas (expected 3). Namespace: {{ $labels.namespace }}.\"


"
  alerts: '{}

