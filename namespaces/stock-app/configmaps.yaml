    \  // Load social feed in parallel (non-blocking)
  fetchSocial(sym);
}

\
    // ── Social Feed (StockTwits) ───────────────────────────────────────
async\
    \ function fetchSocial(sym) {
  const section = document.getElementById('social-section');
\
    \  const content = document.getElementById('social-content');
  section.style.display\
    \ = '';
  content.innerHTML = '<div class=\"ss-loading\">Fetching social posts…</div>';
\
    \  try {
    const r = await fetch(API + '/social/' + encodeURIComponent(sym));
\
    \    if (!r.ok) { content.innerHTML = '<div class=\"ss-loading\">No social data\
    \ available</div>'; return; }
    const d = await r.json();
    if (!d.messages\
    \ || !d.messages.length) {
      content.innerHTML = `<div class=\"ss-loading\"\
    >No recent posts for ${dispSym(sym)}</div>`;
