      ${neutral > 0 ? `<div class=\"ss-pill ss-neutral\">⬜ ${neutral}\
    \ Neutral</div>` : ''}
    </div>`;
    html += '<div class=\"social-feed\"\
    >';
    html += d.messages.map(m => {
      const sentHtml = m.sentiment ===\
    \ 'Bullish'
