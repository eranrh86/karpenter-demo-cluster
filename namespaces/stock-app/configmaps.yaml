    >🐻 Bear</span>'
        : '';
      let timeStr = '';
      if (m.time)\
    \ {
        try {
          const dt = new Date(m.time);
          const now\
    \ = new Date();
          const diffMin = Math.round((now - dt) / 60000);
 \
    \         timeStr = diffMin < 60 ? diffMin + 'm ago'
                  : diffMin\
    \ < 1440 ? Math.round(diffMin/60) + 'h ago'
                  : dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});
\
    \        } catch(e) {}
      }
      const escaped = m.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
\
    \      return `<div class=\"social-msg\">
        <div class=\"sm-header\">
\
    \          <span class=\"sm-user\">@${m.user}</span>
          ${sentHtml}
\
    \          <span class=\"sm-time\">${timeStr}</span>
        </div>
       \
    \ <div class=\"sm-body\">${escaped}</div>
        ${m.likes > 0 ? `<div class=\"\
    sm-likes\">❤ ${m.likes}</div>` : ''}
      </div>`;
    }).join('');
    html\
    \ += '</div>';
    html += `<span class=\"ss-st-link\">Source: <a href=\"https://stocktwits.com/symbol/${d.st_sym}\"\
    \ target=\"_blank\" rel=\"noopener\">StockTwits $${d.st_sym}</a></span>`;
  \
    \  content.innerHTML = html;
  } catch(e) {
    content.innerHTML = '<div class=\"\
    ss-loading\">Social feed unavailable</div>';
  }
}

// Chart.js price + MA\
    \ chart
function renderChart(d) {
  const ctx = document.getElementById('priceChart').getContext('2d');
\
    \  if (chart) chart.destroy();
  const c = d.chart || {};
  const datasets =\
    \ [
    { label: 'Price', data: c.closes, borderColor: '#58a6ff', borderWidth:\
    \ 2, pointRadius: 0, tension: 0.2, fill: false, order: 1 },
    { label: 'MA\
    \ 50',  data: c.ma50,  borderColor: '#f0883e', borderWidth: 1.5, borderDash: [],\
    \ pointRadius: 0, tension: 0, fill: false, spanGaps: true },
    { label: 'MA\
    \ 100', data: c.ma100, borderColor: '#d2a8ff', borderWidth: 1.5, borderDash: [4,3],\
    \ pointRadius: 0, tension: 0, fill: false, spanGaps: true },
    { label: 'MA\
    \ 150', data: c.ma150, borderColor: '#3fb950', borderWidth: 1.5, borderDash: [3,2],\
    \ pointRadius: 0, tension: 0, fill: false, spanGaps: true },
