            factor = 0.01
            display_ccy = \"ILS\"
\
    \        else:
            factor = 1.0
            display_ccy = raw_ccy
\
    \        def rescale(v): return round(v * factor, 2) if v else v
        entry\
    \ = {
            \"price\":    rescale(cur), \"change\": rescale(chg), \"pct\"\
    : round(pct, 2),
