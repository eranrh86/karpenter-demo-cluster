---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: stock-backend
    tier: backend
  name: stock-backend
  namespace: stock-app
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: stock-backend
      tier: backend
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: stock-backend
        tier: backend
        version: v2
    spec:
      containers:
      - command:
        - sh
        - -c
        - 'pip install flask flask-cors yfinance pandas numpy ddtrace --quiet 2>&1
          | tail -3

          DD_LOGS_INJECTION=true ddtrace-run python3 /scripts/app.py

          '
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: spec.nodeName
        - name: POD_IP
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: status.podIP
        - name: DD_AGENT_HOST
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: status.hostIP
        - name: DD_SERVICE
          value: stock-backend
        - name: DD_ENV
          value: demo
        - name: DD_VERSION
          value: '1.0'
        - name: DD_LOGS_INJECTION
          value: 'true'
        - name: DD_TRACE_SAMPLE_RATE
          value: '1'
        - name: DD_TRACE_ENABLED
          value: 'true'
        - name: DD_RUNTIME_METRICS_ENABLED
          value: 'true'
        image: python:3.11-slim
        imagePullPolicy: IfNotPresent
        name: backend
        ports:
        - containerPort: 8080
          protocol: TCP
        readinessProbe:
          failureThreshold: 12
          httpGet:
            path: /health
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 90
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        resources:
          limits:
            cpu: '1'
            memory: 512Mi
          requests:
            cpu: 50m
            memory: 256Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /scripts
          name: scripts
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
      - configMap:
          defaultMode: 420
          name: stock-backend-config
        name: scripts

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stock-frontend
  namespace: stock-app
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: stock-frontend
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: stock-frontend
        tier: frontend
    spec:
      containers:
      - image: nginx:alpine
        imagePullPolicy: IfNotPresent
        name: frontend
        ports:
        - containerPort: 80
          protocol: TCP
        resources:
          limits:
            cpu: 100m
            memory: 64Mi
          requests:
            cpu: 10m
            memory: 32Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /usr/share/nginx/html/index.html
          name: html
          subPath: index.html
        - mountPath: /etc/nginx/conf.d/default.conf
          name: html
          subPath: nginx.conf
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
      - configMap:
          defaultMode: 420
          name: stock-frontend-html
        name: html
