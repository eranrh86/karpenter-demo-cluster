---
apiVersion: v1
data:
  app.py: "#!/usr/bin/env python3
import os, time, threading
from flask import Flask,\
    \ jsonify

app = Flask(__name__)
counter = 0
start_time = time.time()
lock\
    \ = threading.Lock()

def background_increment():
    global counter
    while\
    \ True:
        time.sleep(1)
        with lock:
            counter += 1
\
    
t = threading.Thread(target=background_increment, daemon=True)
t.start()

\
    @app.route('/counter')
def get_counter():
    with lock:
        val = counter
\
    \    return jsonify({
        'counter': val,
        'pid': os.getpid(),
\
    \        'hostname': os.environ.get('HOSTNAME', 'unknown'),
        'uptime_seconds':\
    \ round(time.time() - start_time, 1)
    })

@app.route('/health')
def health():
\
    \    return 'ok'

if __name__ == '__main__':
    print(f\"Counter app starting\
    \ on port 8080, pid={os.getpid()}\", flush=True)
    app.run(host='0.0.0.0',\
    \ port=8080)
"
