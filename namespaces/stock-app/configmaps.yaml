<script>
const API = '/api';
let stocks = {};
\
    let sel = null;
let chart = null;

// Currency symbol helper — uses stored\
    \ currency from API, falls back to .TA heuristic
const CCY_MAP = { USD:'$', ILS:'₪',\
    \ ILA:'₪', EUR:'€', GBP:'£', JPY:'¥', CAD:'$', AUD:'$' };
function ccy(sym) {
\
    \  const d = stocks[sym];
  if (d && d.currency && CCY_MAP[d.currency]) return\
    \ CCY_MAP[d.currency];
  return sym && sym.endsWith('.TA') ? '₪' : '$';
}
\
    // Display name — strip .TA suffix for cleaner watchlist
function dispSym(sym)\
    \ {
  if (!sym) return sym;
  if (sym.endsWith('.TA')) return sym.slice(0, -3);
\
    \  if (sym.endsWith('-USD')) return sym.slice(0, -4);
  const M = {'GC=F':'GOLD','SI=F':'SILVER','CL=F':'OIL','NG=F':'GAS','HG=F':'COPPER',
\
    \             'ILS=X':'USD/ILS','EURUSD=X':'EUR/USD','GBPUSD=X':'GBP/USD','JPY=X':'USD/JPY'};
\
    \  return M[sym] || sym;
}

// ── Stock Search Engine ────────────────────────────────────────────
\
    const FLAG = { US:'🇺🇸', IL:'🇮🇱', NL:'🇳\
    🇱', DE:'🇩🇪', CA:'🇨🇦', SE:'🇸\
    🇪', GB:'🇬🇧',
               JP:'🇯🇵\
    ', AU:'🇦🇺', EU:'🇪🇺', IE:'🇮🇪\
    ', Global:'🌐' };
let searchTimer = null;
let dropFocus   = -1;
let\
    \ dropItems   = [];
let _catalogCache = [];

const searchInp  = document.getElementById('search-inp');
\
    const searchDrop = document.getElementById('search-drop');

function closeSearch()\
    \ {
  searchDrop.classList.remove('open');
  dropFocus = -1;
  dropItems =\
    \ [];
}

function renderDropdown(results, sectionLabel) {
  if (!results.length)\
    \ { closeSearch(); return; }
  dropItems = results;
  dropFocus = -1;
  let\
    \ html = sectionLabel ? `<div class=\"search-section\">${sectionLabel}</div>`\
    \ : '';
  html += results.map((r, i) => {
    const flag   = FLAG[r.country]\
    \ || '🌐';
    const wl     = r.in_watchlist ? '<span class=\"si-wl-tag\"\
    >✓ In watchlist</span>' : '<span class=\"si-add-hint\">↵ Add</span>';
    const\
    \ cls    = r.in_watchlist ? ' in-wl' : '';
    return `<div class=\"search-item${cls}\"\
    \ data-i=\"${i}\" onpointerdown=\"pickFromDrop(${i})\">
      <span class=\"\
    si-flag\">${flag}</span>
      <span class=\"si-sym\">${r.symbol}</span>
  \
    \    <span class=\"si-name\">${r.name}</span>
      <span class=\"si-exch\">${r.exchange}</span>
\
    \      <span class=\"si-sec\">${r.sector||''}</span>
      ${wl}
    </div>`;
\
    \  }).join('');
  searchDrop.innerHTML = html;
  searchDrop.classList.add('open');
\
    }

async function doSearch(q) {
  if (q.length < 1) { showPopular(); return;\
    \ }
  try {
    const r = await fetch(API + '/search?q=' + encodeURIComponent(q));
\
    \    const d = await r.json();
    renderDropdown(d.results || [], null);
 \
    \ } catch(e) { closeSearch(); }
}

async function showPopular() {
  const\
    \ POPULAR = ['AAPL','TSLA','NVDA','BTC-USD','ETH-USD','GC=F','MSFT','AMZN','META','GOOGL','ILS=X','SI=F'];
\
    \  const wl = new Set(Object.keys(stocks));
  const items = POPULAR.map(sym =>\
    \ {
    const found = _catalogCache.find(c => c.symbol === sym);
    return\
    \ found ? {...found, in_watchlist: wl.has(sym)} : null;
  }).filter(Boolean);
\
    \  renderDropdown(items, '⭐ Popular');
}

searchInp.addEventListener('focus',\
    \ () => {
  if (!searchInp.value.trim()) showPopular();
});

searchInp.addEventListener('input',\
    \ e => {
  clearTimeout(searchTimer);
  const q = e.target.value.trim();
 \
    \ if (!q) { showPopular(); return; }
  searchTimer = setTimeout(() => doSearch(q),\
    \ 180);
});

searchInp.addEventListener('keydown', e => {
  if (!searchDrop.classList.contains('open'))\
    \ return;
  const items = searchDrop.querySelectorAll('.search-item');
  if\
    \ (e.key === 'ArrowDown') {
    e.preventDefault();
    dropFocus = Math.min(dropFocus\
    \ + 1, items.length - 1);
    items.forEach((el,i) => el.classList.toggle('focused',\
    \ i === dropFocus));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
\
    \    dropFocus = Math.max(dropFocus - 1, 0);
    items.forEach((el,i) => el.classList.toggle('focused',\
    \ i === dropFocus));
  } else if (e.key === 'Enter') {
    e.preventDefault();
\
    \    if (dropFocus >= 0 && dropItems[dropFocus]) pickFromDrop(dropFocus);
  \
    \  else if (dropItems[0]) pickFromDrop(0);
  } else if (e.key === 'Escape') {
\
    \    closeSearch();
  }
});

document.addEventListener('click', e => {
 \
    \ if (!document.getElementById('search-wrap').contains(e.target)) closeSearch();
\
    });

async function pickFromDrop(i) {
  const item = dropItems[i];
  if (!item)\
    \ return;
  closeSearch();
  searchInp.value = '';
  await addStockBySymbol(item.symbol);
\
    }

async function addStockBySymbol(sym) {
  if (stocks[sym]) { selectStock(sym);\
    \ return; }
  stocks[sym] = { symbol: sym, loading: true };
  renderWatchlist();
\
    \  try {
    const r = await fetch(API + '/stocks/add', {
      method: 'POST',\
    \ headers: {'Content-Type':'application/json'},
      body: JSON.stringify({\
    \ symbol: sym })
    });
    const j = await r.json();
    if (j.status ===\
    \ 'error') {
      delete stocks[sym];
      renderWatchlist();
      alert('Symbol\
    \ not found: ' + sym);
    }
  } catch(e) { console.error(e); }
}

// Clock
\
    function tick() {
  const d = new Date();
  document.getElementById('clock').textContent\
    \ =
    d.toLocaleTimeString('en-US',{hour12:false,timeZone:'America/New_York'})\
    \ + ' ET';
}
setInterval(tick, 1000); tick();

function fmt(n, dec=2) {
\
    \  if (n == null) return '—';
  return parseFloat(n).toLocaleString('en-US',{minimumFractionDigits:dec,maximumFractionDigits:dec});
\
    }
function fmtVol(n) {
  if (!n) return '—';
  if (n >= 1e9) return (n/1e9).toFixed(1)+'B';
\
    \  if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
  if (n >= 1e3) return (n/1e3).toFixed(0)+'K';
\
    \  return n;
}
function maInd(price, ma) {
  if (!ma || !price) return '<span\
    \ class=\"ma-ind ma-eq\">—</span>';
  const diff = ((price - ma) / ma * 100).toFixed(1);
\
    \  const cls  = price > ma ? 'ma-up' : 'ma-dn';
  const arr  = price > ma ? '▲'\
    \ : '▼';
  return `<span class=\"ma-ind ${cls}\">${arr}${Math.abs(diff)}%</span>`;
\
    }

// Render watchlist
function renderWatchlist() {
  const body = document.getElementById('wl-body');
\
    \  let html = '';
  for (const [sym, d] of Object.entries(stocks)) {
    if\
    \ (d.loading) {
      html += `<div class=\"loading-row\">${sym}: Loading real\
    \ data...</div>`;
      continue;
    }
    const pos  = d.change >= 0;
 \
    \   const act  = sel === sym ? ' active' : '';
    const c    = ccy(sym);
 \
    \   const badge = sym.endsWith('.TA')   ? '<span class=\"tase-badge\">TA</span>'
\
    \                : sym.endsWith('-USD') ? '<span class=\"tase-badge\" style=\"\
    background:#f0883e22;color:#f0883e;border-color:#f0883e44\">₿</span>'
      \
    \          : sym.includes('=')   ? '<span class=\"tase-badge\" style=\"background:#58a6ff22;color:#58a6ff;border-color:#58a6ff44\"\
    >FX</span>'
                : '';
    const label = dispSym(sym) + badge;
\
    \    html += `<div class=\"wl-row${act}\" onclick=\"selectStock('${sym}')\">
\
    \      <div><div class=\"sym\">${label}</div></div>
      <div class=\"sname\"\
    \ title=\"${d.name}\">${d.name||sym}</div>
      <div class=\"price\">${c}${fmt(d.price)}</div>
\
    \      <div class=\"chg ${pos?'pos':'neg'}\">${pos?'+':''}${fmt(d.pct,2)}%</div>
\
    \      <div class=\"del-btn\" onclick=\"event.stopPropagation();removeStock('${sym}')\"\
    >✕</div>
    </div>`;
  }
  body.innerHTML = html || '<div class=\"loading-row\"\
    >Loading stocks…</div>';
}

// Ticker bar
function renderTicker() {
  let\
    \ t = '';
  for (const [sym, d] of Object.entries(stocks)) {
    if (d.loading)\
    \ continue;
    const pos = d.change >= 0;
    const cls = pos ? 'tick-p' :\
    \ 'tick-n';
    t += `<div class=\"tick-item\"><strong>${dispSym(sym)}</strong>\
    \ <span class=\"${cls}\">${ccy(sym)}${fmt(d.price)} ${pos?'+':''}${fmt(d.pct,2)}%</span></div>`;
\
    \  }
  // Duplicate for seamless loop
  const el = document.getElementById('ticker');
\
    \  el.innerHTML = `<div class=\"ticker-inner\">${t}${t}</div>`;
}

// Update\
    \ selected stock header + chart price
function updateChartHeader() {
  if (!sel\
    \ || !stocks[sel] || stocks[sel].loading) return;
  const d = stocks[sel];
\
    \  const c = ccy(sel);
  document.getElementById('ch-sym').textContent = `${dispSym(sel)}\
    \ — ${d.name||''}`;
  document.getElementById('ch-price').textContent = c + fmt(d.price);
\
    \  const pos = d.change >= 0;
  const chg = document.getElementById('ch-chg');
\
    \  chg.textContent = `${pos?'+':''}${c}${fmt(Math.abs(d.change))} (${pos?'+':''}${fmt(d.pct,2)}%)`;
\
    \  chg.className = 'ch-chg ' + (pos ? 'pos' : 'neg');
}

// Fetch all stocks
\
    async function fetchStocks() {
  try {
    const r = await fetch(API + '/stocks');
\
    \    const d = await r.json();
    for (const s of d.stocks) stocks[s.symbol]\
    \ = s;
    renderWatchlist();
    renderTicker();
