    \   // ✅ RECOMMENDED beforeSend filtering
        beforeSend: (event, context)\
    \ => {
          if (event.type === 'resource') {
            const url = event.resource\
    \ ? event.resource.url : '';
            const type = event.resource ? event.resource.type\
    \ : '';

            // ✅ KEEP: API calls (XHR / Fetch) — business-critical
\
    \            if (type === 'xhr' || type === 'fetch') {
