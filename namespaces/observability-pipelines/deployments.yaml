---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: pipeline-worker
    app.kubernetes.io/name: observability-pipelines-worker
    pipeline: stock-app-flex-logs
    size: extra-small
  name: observability-pipelines-worker
  namespace: observability-pipelines
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/name: observability-pipelines-worker
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/component: pipeline-worker
        app.kubernetes.io/name: observability-pipelines-worker
        pipeline: stock-app-flex-logs
    spec:
      containers:
      - args:
        - --config
        - /etc/vector/vector.yaml
        env:
        - name: DD_API_KEY
          valueFrom:
            secretKeyRef:
              key: api-key
              name: opw-datadog-secret
        - name: VECTOR_LOG
          value: info
        image: timberio/vector:0.43.1-debian
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /health
            port: 8686
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 15
          successThreshold: 1
          timeoutSeconds: 1
        name: observability-pipelines-worker
        ports:
        - containerPort: 8282
          name: datadog-agent
          protocol: TCP
        - containerPort: 9090
          name: prom-metrics
          protocol: TCP
        - containerPort: 8686
          name: vector-api
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /health
            port: 8686
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 5
          successThreshold: 1
          timeoutSeconds: 1
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 200m
            memory: 256Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /etc/vector
          name: pipeline-config
          readOnly: true
        - mountPath: /var/lib/vector
          name: vector-data
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      serviceAccount: observability-pipelines-worker
      serviceAccountName: observability-pipelines-worker
      terminationGracePeriodSeconds: 60
      volumes:
      - configMap:
          defaultMode: 420
          name: opw-pipeline-config
        name: pipeline-config
      - emptyDir: {}
        name: vector-data
