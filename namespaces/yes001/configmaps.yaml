    .before .stat-num { color: #ff4d4d; }
    .after  .stat-num\
    \ { color: #4dff91; }
    .arrow { font-size: 1.5rem; margin-top: 24px; opacity:\
    \ 0.6; }
    .footer { margin-top: 60px; color: #555; font-size: 0.8rem; text-align:\
    \ center; }
    .dd-badge {
      display: inline-flex; align-items: center;\
    \ gap: 8px;
      background: rgba(108, 99, 255, 0.15); border: 1px solid rgba(108,99,255,0.3);
\
    \      border-radius: 20px; padding: 6px 16px; margin-bottom: 40px; font-size:\
