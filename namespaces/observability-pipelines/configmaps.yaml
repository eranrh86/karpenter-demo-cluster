---
apiVersion: v1
data:
  vector.yaml: "# Datadog Observability Pipeline — stock-app → Flex Logs
# Vector\
    \ engine with datadog_agent source + datadog_logs sink

api:
  enabled: true
\
    \  address: \"0.0.0.0:8686\"

sources:
  datadog_agent_in:
    type: datadog_agent
\
    \    address: \"0.0.0.0:8282\"
    acknowledgements:
      enabled: true
 \
    \ internal_metrics_source:
    type: internal_metrics

transforms:
  filter_stock_app:
\
    \    type: filter
    inputs:
      - datadog_agent_in
    # Datadog Agent\
    \ encodes k8s metadata in ddtags as \"kube_namespace:stock-app\"
    condition:\
    \ 'exists(.ddtags) && contains(string!(.ddtags), \"kube_namespace:stock-app\"\
    )'

  tag_for_flex:
    type: remap
    inputs:
      - filter_stock_app
\
    \    source: |
      # Tag logs for Flex Logs routing and add enrichment
  \
    \    if exists(.ddtags) {
        tags = string!(.ddtags)
        if !contains(tags,\
    \ \"storage:flex\") {
          .ddtags = tags + \",storage:flex,env:prod,pipeline:vector-opw\"\
    
        }
      } else {
        .ddtags = \"storage:flex,env:prod,pipeline:vector-opw,kube_namespace:stock-app\"\
    
      }
      # Ensure service tag is set
      if !exists(.service) || is_null(.service)\
    \ {
        .service = \"stock-app\"
      }

sinks:
  datadog_flex_logs:
\
    \    type: datadog_logs
    inputs:
      - tag_for_flex
    default_api_key:\
    \ \"${DD_API_KEY}\"
    site: datadoghq.com
    compression: gzip
    batch:
\
    \      max_bytes: 4250000
      max_events: 1000
      timeout_secs: 5
   \
    \ request:
      concurrency: 5
      rate_limit_num: 100
      rate_limit_duration_secs:\
    \ 1
    healthcheck:
      enabled: true

  internal_metrics:
    type: prometheus_exporter
\
    \    inputs:
      - internal_metrics_source
    address: \"0.0.0.0:9090\"
"
kind: ConfigMap
metadata:
  name: opw-pipeline-config
  namespace: observability-pipelines
