---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: demo-fire-ui
  name: demo-fire-ui
  namespace: monitoring
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: demo-fire-ui
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: demo-fire-ui
    spec:
      containers:
      - command:
        - python3
        - server.py
        env:
        - name: PORT
          value: '8080'
        - name: PUSHGATEWAY_URL
          value: http://prometheus-prometheus-pushgateway.monitoring.svc.cluster.local:9091
        image: python:3-alpine
        imagePullPolicy: IfNotPresent
        name: app
        ports:
        - containerPort: 8080
          protocol: TCP
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /app
          name: app
        workingDir: /app
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
      - configMap:
          defaultMode: 420
          name: demo-fire-ui-files
        name: app

