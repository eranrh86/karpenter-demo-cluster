def refresh_loop():
    while True:
        with stocks_lock:
          \
    \  syms = list(stocks)
        for sym in syms:
            with data_lock:
\
    \                age = time.time() - price_cache.get(sym, {}).get(\"_ts\", 0)
\
    \            if age > 300:      # refresh every 5 minutes
                threading.Thread(target=load_stock,\
    \ args=(sym,), daemon=True).start()
        time.sleep(60)

def initial_load():
\
    \    with stocks_lock:
        syms = list(stocks)
    threads = [threading.Thread(target=load_stock,\
    \ args=(s,), daemon=True) for s in syms]
    for t in threads: t.start()
  \
    \  for t in threads: t.join()
    print(f\"All {len(syms)} stocks loaded.\",\
    \ flush=True)

threading.Thread(target=initial_load, daemon=True).start()
\
    threading.Thread(target=refresh_loop, daemon=True).start()

