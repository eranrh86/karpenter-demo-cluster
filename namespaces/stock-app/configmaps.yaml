    \ <= 767) {
    setTimeout(() => document.querySelector('.chart-area')
    \
    \  .scrollIntoView({behavior:'smooth', block:'start'}), 80);
  }
  try {
 \
    \   const r = await fetch(API + '/stock/' + sym);
    if (!r.ok) { document.getElementById('chart-empty').textContent\
    \ = 'Loading data…'; return; }
    const d = await r.json();
    updateChartHeader();
\
    \    renderChart(d);
    renderFundamentals(d.fundamentals || {});
    renderTechnicals(d);
\
    \    renderAnalyst(d.fundamentals || {});
